{% extends 'base.html' %}
{% block title %}Xóa việc{% endblock %}
{% block content %}
<section class="panel danger">
    <h1>Xác nhận xóa việc</h1>
    <p>Bạn có chắc chắn muốn xóa <strong>{{ job.title }}</strong>? Hành động này không thể hoàn tác.</p>
    <form method="post" class="actions-row">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next_url }}">
        <button class="button button-danger" type="submit">Đồng ý xóa</button>
        <a href="{% url 'job_detail' job.pk %}" class="button button-ghost">Hủy</a>
    </form>
</section>
{% endblock %}
