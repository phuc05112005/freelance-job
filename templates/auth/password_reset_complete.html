{% extends 'base.html' %}
{% block title %}Đổi mật khẩu thành công{% endblock %}
{% block content %}
<section class="auth-wrap">
    <div class="auth-panel" style="text-align: center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#2a9d8f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px;">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <h1>Thành công!</h1>
        <p>Mật khẩu của bạn đã được cập nhật thành công vào cơ sở dữ liệu.</p>
        <p>Bây giờ bạn có thể đăng nhập bằng mật khẩu mới của mình.</p>
        <a href="{% url 'login' %}" class="button" style="margin-top: 20px; display: inline-block;">Đăng nhập ngay</a>
    </div>
</section>
{% endblock %}
