{% extends 'base.html' %}
{% block content %}
<style>
    :root { --admin-header-h: 72px; }

    .page.container.wide-page {
        width: 100% !important;
        max-width: none !important;
        margin: 0 !important;
        padding: 0 !important;
        margin-top: calc(var(--admin-header-h) - 22px) !important;
        height: calc(100vh - var(--admin-header-h) + 22px);
        min-height: calc(100vh - var(--admin-header-h) + 22px);
    }

    .site-footer,
    .floating-employer-cta {
        display: none !important;
    }

    .admin-shell {
        height: 100%;
        min-height: 100%;
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 0;
        overflow: visible;
    }

    .admin-sidebar {
        border-right: 1px solid #1e293b;
        background: #0f172a;
        color: #e2e8f0;
        padding: 18px 12px;
        position: sticky;
        top: 0;
        height: 100%;
        overflow: auto;
    }

    .admin-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        font-size: 17px;
        color: #f8fafc;
        text-decoration: none;
        padding: 8px 10px 14px;
    }

    .admin-sidebar nav {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .admin-nav-link {
        color: #cbd5e1;
        text-decoration: none;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        transition: all .2s ease;
    }

    .admin-nav-link:hover { background: #1e293b; color: #ffffff; }

    .admin-nav-link.active {
        background: linear-gradient(135deg, #0f766e, #0ea5a1);
        color: #ffffff;
        box-shadow: 0 10px 22px rgba(15, 118, 110, 0.35);
    }

    .admin-main {
        min-width: 0;
        padding: 22px 24px;
        overflow: auto;
    }

    .admin-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        gap: 12px;
    }

    .admin-head h1 { margin: 0; font-size: clamp(24px, 2.8vw, 32px); }
    .admin-head p { margin: 6px 0 0; color: #64748b; }

    .button-danger { background: #dc2626; border-color: #dc2626; color: #fff; }
    .button-danger:hover { background: #b91c1c; border-color: #b91c1c; }

    @media (max-width: 1200px) {
        .admin-shell { grid-template-columns: 220px 1fr; }
        .admin-main { padding: 18px; }
        .admin-nav-link { font-size: 13px; padding: 9px 10px; }
    }

    @media (max-width: 900px) {
        .page.container.wide-page {
            height: auto;
            min-height: calc(100vh - var(--admin-header-h) + 8px);
            overflow: visible;
        }
        .admin-shell { grid-template-columns: 1fr; }
        .admin-sidebar {
            position: sticky;
            top: 0;
            height: auto;
            border-right: none;
            border-bottom: 1px solid #1e293b;
            z-index: 3;
            padding: 10px;
            overflow: visible;
        }
        .admin-brand {
            font-size: 15px;
            padding: 4px 8px 8px;
        }
        .admin-sidebar nav {
            flex-direction: row;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 8px;
            padding-bottom: 2px;
            scrollbar-width: thin;
        }
        .admin-sidebar nav::-webkit-scrollbar {
            height: 6px;
        }
        .admin-sidebar nav::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 99px;
        }
        .admin-nav-link {
            white-space: nowrap;
            flex: 0 0 auto;
            border: 1px solid #233247;
            background: #111d31;
        }
        .admin-main {
            padding: 14px 12px 18px;
            overflow: visible;
        }
    }

    @media (max-width: 520px) {
        .page.container.wide-page {
            margin-top: calc(var(--admin-header-h) - 4px) !important;
        }
        .admin-main { padding: 12px 10px 16px; }
        .admin-sidebar {
            padding: 8px;
        }
        .admin-nav-link {
            font-size: 12px;
            padding: 8px 10px;
        }
        .admin-head h1 { font-size: 26px; }
    }
</style>

{% with current=request.resolver_match.url_name %}
<div class="admin-shell">
    <aside class="admin-sidebar">
        <a class="admin-brand" href="{% url 'admin_center' %}">Admin Center</a>
        <nav>
            <a class="admin-nav-link {% if current == 'admin_center' %}active{% endif %}" href="{% url 'admin_center' %}">Tổng quan</a>
            <a class="admin-nav-link {% if current == 'admin_users' or current == 'admin_user_detail' %}active{% endif %}" href="{% url 'admin_users' %}">Tài khoản</a>
            <a class="admin-nav-link {% if current == 'admin_jobs' %}active{% endif %}" href="{% url 'admin_jobs' %}">Việc làm</a>
            <a class="admin-nav-link {% if current == 'admin_applications' %}active{% endif %}" href="{% url 'admin_applications' %}">Ứng tuyển</a>
            <a class="admin-nav-link {% if current == 'admin_categories' %}active{% endif %}" href="{% url 'admin_categories' %}">Lĩnh vực</a>
            <a class="admin-nav-link {% if current == 'admin_exp_levels' %}active{% endif %}" href="{% url 'admin_exp_levels' %}">Kinh nghiệm</a>
            <a class="admin-nav-link {% if current == 'admin_work_modes' %}active{% endif %}" href="{% url 'admin_work_modes' %}">Hình thức</a>
            <a class="admin-nav-link {% if current == 'admin_employment_types' %}active{% endif %}" href="{% url 'admin_employment_types' %}">Loại việc</a>
        </nav>
    </aside>

    <main class="admin-main">
        {% block admin_body %}{% endblock %}
    </main>
</div>
{% endwith %}
<script>
    (function () {
        const header = document.querySelector('.site-header');
        if (!header) return;
        const setHeaderHeight = () => {
            const h = Math.ceil(header.getBoundingClientRect().height);
            document.documentElement.style.setProperty('--admin-header-h', h + 'px');
        };
        setHeaderHeight();
        window.addEventListener('resize', setHeaderHeight);
    })();
</script>
{% endblock %}
