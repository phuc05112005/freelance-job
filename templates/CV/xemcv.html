{% extends 'base.html' %}
{% load static %}
{% block content %}
    <div>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<div id="CV">
    <h1>{{ cv.hoten }}</h1>
    <p>{{ cv.kinhnghiem }}</p>
    
</div>

<button onclick="downloadCV()">Tải ảnh CV</button>

<script>
function downloadCV() {
    html2canvas(document.querySelector("#CV")).then(canvas => {
        let link = document.createElement('a');
        link.download = 'my-cv.png';
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>
    </div>
{% endblock %}
