{% extends 'base.html' %}
{% load static %}

{% block content %}
<div>
    <a href="{% url 'quanlycv' %}" class="btn-back">
        Quay lại trang trước
    </a>
</div>
<div class="cv-builder-container">
    <div class="container" style="max-width: 900px; margin: auto;">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="section-card">
                <h5 class="section-title">Thông tin cơ bản</h5>
                <div class="layout-flex-header">
                    <div class="col-inputs">
                        <div style="margin-bottom: 15px;">
                            <label class="form-label">Tiêu đề hồ sơ</label>
                            <input type="text" name="tieude" class="form-control" value="{{ cv.tieude }}" placeholder="Ví dụ: Nhân viên bán hàng">
                        </div>
                        <div class="layout-grid-2">
                            <div>
                                <label class="form-label">Họ và tên</label>
                                <input type="text" name="hoten" class="form-control" value="{{ cv.hoten }}">
                            </div>
                            <div>
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" value="{{ cv.email }}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-avatar-box">
                        <img src="{% if cv.avatar %}{{ cv.avatar.url }}{% else %}{% static 'images/default.png' %}{% endif %}" id="avatar-img" class="avatar-preview">
                        <br>
                        <label class="btn-upload-custom">
                            THAY ẢNH
                            <input type="file" name="avatar" hidden accept="image/*" onchange="previewAvatar(this)">
                        </label>
                        
                        {% if cv.avatar %}
                        <div style="margin-top: 10px;">
                            <label style="color: var(--danger); font-size: 0.85rem; cursor: pointer; font-weight: 600;">
                                <input type="checkbox" name="delete_avatar" value="true"> Xóa ảnh hiện tại
                            </label>
                        </div>
                        {% endif %}
                    </div>
                </div>

                <div class="layout-grid-3">
                    <div>
                        <label class="form-label">Số điện thoại</label>
                        <input type="text" name="sdt" class="form-control" value="{{ cv.sdt }}">
                    </div>
                    <div>
                        <label class="form-label">Giới tính</label>
                        <select name="gioitinh" class="form-select">
                            <option value="Nam" {% if cv.gioitinh == "Nam" %}selected{% endif %}>Nam</option>
                            <option value="Nữ" {% if cv.gioitinh == "Nữ" %}selected{% endif %}>Nữ</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Ngày sinh</label>
                        <input type="date" name="ngaysinh" class="form-control" value="{{ cv.ngaysinh|date:'Y-m-d' }}">
                    </div>
                    <div class="span-3">
                        <label class="form-label">Địa Chỉ</label>
                        <input type="text" name="diachi" class="form-control" value="{{ cv.diachi }}">
                    </div>
                </div>
            </div>

            <div class="section-card">
                <h5 class="section-title">Mục tiêu nghề nghiệp</h5>
                <textarea name="muctieu" class="form-control" rows="3">{{ cv.muctieu }}</textarea>
            </div>

            <div class="section-card">
                <h5 class="section-title">Kinh nghiệm làm việc</h5>
                <div id="kn-container">
                    {% for kn in kinhnghiem %}
                    <div class="dynamic-item">
                        <button type="button" class="btn-delete" onclick="removeItem(this)">Xóa</button>
                        <div class="layout-grid-2">
                            <div class="span-2">
                                <label class="form-label">Tên công ty</label>
                                <input type="text" name="kn_congty[]" class="form-control" value="{{ kn.congty }}">
                            </div>
                            <div>
                                <label class="form-label">Vị trí</label>
                                <input type="text" name="kn_vitri[]" class="form-control" value="{{ kn.vitri }}">
                            </div>
                            <div>
                                <label class="form-label">Thời gian</label>
                                <div class="flex-gap-10">
                                    <input type="text" name="kn_batdau[]" class="form-control" value="{{ kn.batdau }}">
                                    <input type="text" name="kn_kethuc[]" class="form-control" value="{{ kn.ketthuc }}">
                                </div>
                            </div>
                            <div class="span-2">
                                <label class="form-label">Mô tả công việc</label>
                                <textarea name="kn_mota[]" class="form-control" rows="3">{{ kn.mota }}</textarea>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <button type="button" class="btn-add" onclick="addItem('kn-template', 'kn-container')">+ THÊM KINH NGHIỆM</button>
            </div>

            <div class="section-card">
                <h5 class="section-title">Học vấn</h5>
                <div id="hv-container">
                    {% for hv in hocvan %}
                    <div class="dynamic-item">
                        <button type="button" class="btn-delete" onclick="removeItem(this)">Xóa</button>
                        <div class="layout-grid-2">
                            <div class="span-2">
                                <label class="form-label">Tên trường</label>
                                <input type="text" name="hv_truong[]" class="form-control" value="{{ hv.truong }}">
                            </div>
                            <div>
                                <label class="form-label">Chuyên ngành</label>
                                <input type="text" name="hv_nganh[]" class="form-control" value="{{ hv.nganh }}">
                            </div>
                            <div>
                                <label class="form-label">Thời gian</label>
                                <div class="flex-gap-10">
                                    <input type="text" name="hv_batdau[]" class="form-control" value="{{ hv.batdau }}">
                                    <input type="text" name="hv_kethuc[]" class="form-control" value="{{ hv.ketthuc }}">
                                </div>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <button type="button" class="btn-add" onclick="addItem('hv-template', 'hv-container')">+ THÊM HỌC VẤN</button>
            </div>

            <div class="section-card">
                <h5 class="section-title">Kỹ năng</h5>
                <textarea name="kynang" class="form-control" rows="3">{{ cv.kynang }}</textarea>
            </div>

            <button type="submit" class="btn-save-big">XÁC NHẬN LƯU THAY ĐỔI</button>
        </form>
    </div>
</div>

<template id="kn-template">
    <div class="dynamic-item">
        <button type="button" class="btn-delete" onclick="removeItem(this)">Xóa</button>
        <div class="layout-grid-2">
            <div class="span-2"><label class="form-label">Tên công ty</label><input type="text" name="kn_congty[]" class="form-control"></div>
            <div><label class="form-label">Vị trí</label><input type="text" name="kn_vitri[]" class="form-control"></div>
            <div>
                <label class="form-label">Thời gian</label>
                <div class="flex-gap-10">
                    <input type="text" name="kn_batdau[]" class="form-control" placeholder="Bắt đầu">
                    <input type="text" name="kn_kethuc[]" class="form-control" placeholder="Kết thúc">
                </div>
            </div>
            <div class="span-2"><label class="form-label">Mô tả công việc</label><textarea name="kn_mota[]" class="form-control" rows="3"></textarea></div>
        </div>
    </div>
</template>

<template id="hv-template">
    <div class="dynamic-item">
        <button type="button" class="btn-delete" onclick="removeItem(this)">Xóa</button>
        <div class="layout-grid-2">
            <div class="span-2"><label class="form-label">Tên trường</label><input type="text" name="hv_truong[]" class="form-control"></div>
            <div><label class="form-label">Chuyên ngành</label><input type="text" name="hv_nganh[]" class="form-control"></div>
            <div>
                <label class="form-label">Thời gian</label>
                <div class="flex-gap-10">
                    <input type="text" name="hv_batdau[]" class="form-control" placeholder="Bắt đầu">
                    <input type="text" name="hv_kethuc[]" class="form-control" placeholder="Kết thúc">
                </div>
            </div>
        </div>
    </div>
</template>

<script>
    function addItem(templateId, containerId) {
        const template = document.getElementById(templateId);
        const container = document.getElementById(containerId);
        container.appendChild(document.importNode(template.content, true));
    }
    function removeItem(btn) {
        if(confirm("Bạn có chắc muốn xóa mục này?")) {
            btn.closest('.dynamic-item').remove();
        }
    }
    function previewAvatar(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => document.getElementById('avatar-img').src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
