<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Default company image</title>
  <desc id="desc">Placeholder image used when a job has no brand image.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2ff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006d77"/>
      <stop offset="100%" stop-color="#0ea8b7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="170" cy="120" r="180" fill="#cfefff" opacity="0.6"/>
  <circle cx="1080" cy="560" r="240" fill="#d8edff" opacity="0.7"/>
  <rect x="290" y="140" width="620" height="400" rx="32" fill="#ffffff" stroke="#d7e6f4" stroke-width="4"/>
  <rect x="345" y="230" width="510" height="170" rx="24" fill="url(#accent)"/>
  <rect x="390" y="455" width="420" height="24" rx="12" fill="#e8f2fb"/>
  <rect x="390" y="495" width="280" height="24" rx="12" fill="#e8f2fb"/>
  <rect x="390" y="268" width="130" height="94" rx="18" fill="#ffffff" opacity="0.95"/>
  <rect x="540" y="288" width="275" height="18" rx="9" fill="#d9f7ff"/>
  <rect x="540" y="322" width="220" height="14" rx="7" fill="#d9f7ff"/>
